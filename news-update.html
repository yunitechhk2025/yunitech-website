<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>YUNI 资讯管理</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter','PingFang TC',sans-serif;background:#f0f2f5;min-height:100vh;color:#333}

/* ── 登录 ── */
#loginPage{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#667eea,#764ba2)}
.login-box{background:#fff;border-radius:20px;padding:3rem 2.5rem;width:360px;text-align:center;box-shadow:0 24px 60px rgba(0,0,0,0.2)}
.login-box .brand{font-size:1.8rem;font-weight:700;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:0.3rem}
.login-box .sub{color:#999;font-size:0.9rem;margin-bottom:2rem}
.login-box input{width:100%;padding:13px 16px;border:2px solid #eee;border-radius:10px;font-size:1rem;outline:none;margin-bottom:1rem;text-align:center;letter-spacing:2px;transition:border .2s}
.login-box input:focus{border-color:#667eea}
.login-box button{width:100%;padding:13px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer}
.err{color:#e53e3e;font-size:.85rem;margin-top:.8rem;display:none}

/* ── 主界面 ── */
#app{display:none}
.topbar{background:#fff;padding:.9rem 2rem;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 10px rgba(0,0,0,.06);position:sticky;top:0;z-index:100}
.topbar .brand{font-weight:700;font-size:1.1rem;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.topbar-links a{color:#667eea;text-decoration:none;font-size:.9rem;margin-left:1.4rem}
.topbar-links a:hover{text-decoration:underline}

.wrap{max-width:960px;margin:0 auto;padding:2rem 1.5rem;display:grid;grid-template-columns:1fr 1fr;gap:2rem}
@media(max-width:700px){.wrap{grid-template-columns:1fr;padding:1rem}}

/* ── 卡片 ── */
.card{background:#fff;border-radius:16px;padding:1.8rem;border:1.5px solid #e8ecf3}
.card-title{font-size:1rem;font-weight:600;margin-bottom:1.4rem;color:#444}

/* ── Token 配置 ── */
.token-bar{background:#fff;border-radius:14px;margin-bottom:1.5rem;border:1.5px solid #e8ecf3;overflow:hidden}
.token-header{padding:1rem 1.4rem;cursor:pointer;display:flex;align-items:center;justify-content:space-between;font-size:.9rem;font-weight:500;color:#555;user-select:none}
.token-dot{width:8px;height:8px;border-radius:50%;background:#e0e0e0;margin-right:.6rem;flex-shrink:0}
.token-dot.ok{background:#48bb78}
.token-body{padding:0 1.4rem 1.2rem;display:none}
.token-body.open{display:block}
.token-row{display:flex;gap:.8rem;align-items:center}
.token-row input{flex:1;padding:10px 14px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:.9rem;outline:none;transition:border .2s;font-family:monospace}
.token-row input:focus{border-color:#667eea}
.btn-token{padding:10px 20px;background:#667eea;color:#fff;border:none;border-radius:8px;font-size:.9rem;font-weight:500;cursor:pointer;white-space:nowrap}
.token-hint{font-size:.78rem;color:#aaa;margin-top:.6rem}
.token-hint a{color:#667eea}

/* ── 表单 ── */
.field{margin-bottom:1.1rem}
.field label{display:block;font-size:.82rem;font-weight:500;color:#666;margin-bottom:.35rem}
.field input,.field textarea{width:100%;padding:10px 14px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:.95rem;outline:none;font-family:inherit;resize:vertical;transition:border .2s}
.field input:focus,.field textarea:focus{border-color:#667eea}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
@media(max-width:480px){.two-col{grid-template-columns:1fr}}

/* 图片上传 */
.img-upload-label{display:flex;align-items:center;justify-content:center;gap:.5rem;padding:1rem;border:2px dashed #c3cef7;border-radius:10px;cursor:pointer;color:#667eea;font-size:.9rem;background:#f8f9ff;transition:background .2s}
.img-upload-label:hover{background:#eef0ff}
.img-preview-wrap{margin-bottom:.6rem}
.img-preview-wrap img{width:100%;max-height:180px;object-fit:cover;border-radius:8px;border:1px solid #eee}
.btn-rm-img{margin-top:.4rem;background:#fff5f5;border:1px solid #fcc;color:#e53e3e;padding:4px 12px;border-radius:6px;font-size:.8rem;cursor:pointer}

/* 语言 tabs */
.lang-tabs{display:flex;gap:.4rem;margin-bottom:1rem}
.lang-tab{padding:5px 14px;border:1.5px solid #ddd;border-radius:20px;font-size:.82rem;cursor:pointer;background:#fff;transition:all .2s}
.lang-tab.on{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border-color:transparent}
.lf{display:none}
.lf.on{display:block}

.pin-row{display:flex;align-items:center;gap:.5rem;margin-bottom:1.1rem}
.pin-row input{width:auto}
.pin-row label{font-size:.9rem;margin:0}

.btn-pub{width:100%;padding:13px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer;transition:opacity .2s;display:flex;align-items:center;justify-content:center;gap:.5rem}
.btn-pub:hover{opacity:.9}
.btn-pub:disabled{opacity:.4;cursor:not-allowed}

/* ── 列表 ── */
.news-item{border:1.5px solid #eee;border-radius:10px;padding:1rem 1.2rem;display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.8rem;transition:border-color .2s}
.news-item:hover{border-color:#c3cef7}
.ni-title{font-weight:600;font-size:.95rem;margin-bottom:.25rem}
.ni-meta{font-size:.8rem;color:#aaa;display:flex;gap:.7rem;flex-wrap:wrap}
.ni-pin{color:#667eea;font-weight:500}
.ni-actions{display:flex;gap:.5rem;flex-shrink:0;margin-left:1rem}
.btn-sm{padding:6px 12px;border-radius:7px;font-size:.8rem;font-weight:500;cursor:pointer;border:1.5px solid;transition:all .2s}
.btn-edit{border-color:#c6f6d5;color:#276749;background:#f0fff4}
.btn-edit:hover{background:#dcfce7}
.btn-pin-toggle{border-color:#c3cef7;color:#667eea;background:#f5f6ff}
.btn-pin-toggle:hover{background:#e8eaff}
.btn-del{border-color:#fcc;color:#e53e3e;background:#fff5f5}
.btn-del:hover{background:#ffe0e0}
.empty{text-align:center;color:#ccc;padding:2.5rem;font-size:.95rem}

/* ── Toast ── */
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(80px);background:#1a202c;color:#fff;padding:11px 22px;border-radius:30px;font-size:.9rem;box-shadow:0 8px 30px rgba(0,0,0,.2);transition:transform .3s;z-index:9999;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.ok{background:#276749}
.toast.err{background:#9b2c2c}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle;margin-right:4px}
@keyframes sp{to{transform:rotate(360deg)}}

.full{grid-column:1/-1}
</style>
</head>
<body>

<!-- 登录 -->
<div id="loginPage">
  <div class="login-box">
    <div class="brand">YUNI TECH</div>
    <div class="sub">资讯管理后台</div>
    <input type="password" id="pw" placeholder="管理密钥" />
    <button onclick="doLogin()">进入</button>
    <div class="err" id="loginErr">密钥错误，请重试</div>
  </div>
</div>

<!-- 主界面 -->
<div id="app">
  <div class="topbar">
    <div class="brand">YUNI 资讯管理</div>
    <div class="topbar-links">
      <a href="index.html" target="_blank">查看官网 ↗</a>
      <a href="#" onclick="logout()">退出</a>
    </div>
  </div>

  <div class="wrap">

    <!-- GitHub Token（全宽，折叠） -->
    <div class="token-bar full">
      <div class="token-header" onclick="toggleToken()">
        <div style="display:flex;align-items:center">
          <div class="token-dot" id="tokenDot"></div>
          <span id="tokenLabel">设置 GitHub Token（发布必须）</span>
        </div>
        <span id="tokenArrow" style="color:#aaa;font-size:.8rem">▼</span>
      </div>
      <div class="token-body" id="tokenBody">
        <div class="token-row">
          <input type="password" id="ghToken" placeholder="ghp_xxxxxxxxxxxxxxxx" />
          <button class="btn-token" onclick="saveToken()">保存到本机</button>
        </div>
        <div class="token-hint">
          Token 需 <code>repo</code> 权限，保存后下次免输。
          <a href="https://github.com/settings/tokens/new?scopes=repo" target="_blank">生成 Token →</a>
        </div>
      </div>
    </div>

    <!-- 发布表单 -->
    <div class="card">
      <div class="card-title">✏️ 发布新资讯</div>

      <div class="two-col">
        <div class="field"><label>日期</label><input type="date" id="fDate" /></div>
        <div class="field"><label>链接（选填）</label><input type="url" id="fLink" placeholder="https://..." /></div>
      </div>

      <!-- 图片上传 -->
      <div class="field">
        <label>图片（选填）</label>
        <div id="imgPreviewWrap" style="display:none" class="img-preview-wrap">
          <img id="imgPreview" src="" alt="">
          <button class="btn-rm-img" onclick="removeImg()">✕ 移除图片</button>
        </div>
        <label class="img-upload-label" id="imgUploadLabel">
          📷 点击上传图片
          <input type="file" id="imgFile" accept="image/*" style="display:none" onchange="previewImg(this)" />
        </label>
      </div>

      <div class="pin-row">
        <input type="checkbox" id="fPinned" />
        <label for="fPinned">置顶此条资讯</label>
      </div>

      <div class="lang-tabs">
        <button class="lang-tab on" onclick="switchLang('zh-tw',this)">繁</button>
        <button class="lang-tab" onclick="switchLang('zh-cn',this)">简</button>
        <button class="lang-tab" onclick="switchLang('en',this)">EN</button>
      </div>

      <div class="lf on" id="lf-zh-tw">
        <div class="field"><label>標題（繁）</label><input type="text" id="t-zh-tw" placeholder="資訊標題" /></div>
        <div class="field"><label>內容（繁）</label><textarea id="c-zh-tw" rows="3" placeholder="資訊內容…"></textarea></div>
      </div>
      <div class="lf" id="lf-zh-cn">
        <div class="field"><label>标题（简）</label><input type="text" id="t-zh-cn" placeholder="资讯标题" /></div>
        <div class="field"><label>内容（简）</label><textarea id="c-zh-cn" rows="3" placeholder="资讯内容…"></textarea></div>
      </div>
      <div class="lf" id="lf-en">
        <div class="field"><label>Title (EN)</label><input type="text" id="t-en" placeholder="News title" /></div>
        <div class="field"><label>Content (EN)</label><textarea id="c-en" rows="3" placeholder="Content…"></textarea></div>
      </div>

      <button class="btn-pub" id="pubBtn" onclick="publish()">🚀 发布资讯</button>
    </div>

    <!-- 已发布列表 -->
    <div class="card">
      <div class="card-title">📋 已发布资讯</div>
      <div id="newsList"></div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<!-- 编辑弹窗 -->
<div id="editOverlay" style="display:none;position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,0.5);align-items:center;justify-content:center;padding:1rem;">
  <div style="background:#fff;border-radius:18px;padding:2rem;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.25);">
    <div style="font-size:1.05rem;font-weight:700;margin-bottom:1.4rem;color:#333">✏️ 编辑资讯</div>

    <div class="two-col">
      <div class="field"><label>日期</label><input type="date" id="eFDate" /></div>
      <div class="field"><label>链接（选填）</label><input type="url" id="eFLink" placeholder="https://..." /></div>
    </div>

    <div class="field">
      <label>图片（选填）</label>
      <div id="eImgPreviewWrap" style="display:none" class="img-preview-wrap">
        <img id="eImgPreview" src="" alt="">
        <button class="btn-rm-img" onclick="eRemoveImg()">✕ 移除图片</button>
      </div>
      <label class="img-upload-label" id="eImgUploadLabel">
        📷 点击更换图片
        <input type="file" id="eImgFile" accept="image/*" style="display:none" onchange="ePreviewImg(this)" />
      </label>
      <input type="hidden" id="eImgUrl" />
    </div>

    <div class="pin-row"><input type="checkbox" id="eFPinned" /><label for="eFPinned">置顶</label></div>

    <div class="lang-tabs">
      <button class="lang-tab on" id="eLangTab-zh-tw" onclick="eSwLang('zh-tw',this)">繁</button>
      <button class="lang-tab" id="eLangTab-zh-cn" onclick="eSwLang('zh-cn',this)">简</button>
      <button class="lang-tab" id="eLangTab-en"    onclick="eSwLang('en',this)">EN</button>
    </div>
    <div class="lf on" id="elf-zh-tw">
      <div class="field"><label>標題（繁）</label><input type="text" id="et-zh-tw" /></div>
      <div class="field"><label>內容（繁）</label><textarea id="ec-zh-tw" rows="3"></textarea></div>
    </div>
    <div class="lf" id="elf-zh-cn">
      <div class="field"><label>标题（简）</label><input type="text" id="et-zh-cn" /></div>
      <div class="field"><label>内容（简）</label><textarea id="ec-zh-cn" rows="3"></textarea></div>
    </div>
    <div class="lf" id="elf-en">
      <div class="field"><label>Title (EN)</label><input type="text" id="et-en" /></div>
      <div class="field"><label>Content (EN)</label><textarea id="ec-en" rows="3"></textarea></div>
    </div>

    <div style="display:flex;gap:.8rem;margin-top:1.4rem;">
      <button onclick="saveEdit()" style="flex:1;padding:11px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:9px;font-size:.95rem;font-weight:600;cursor:pointer;">保存并发布</button>
      <button onclick="closeEdit()" style="padding:11px 18px;border:1.5px solid #e2e8f0;border-radius:9px;background:#f8f9fa;cursor:pointer;font-size:.9rem;">取消</button>
    </div>
  </div>
</div>

<script>
const ADMIN_KEY = 'yuni-news-2026';
const GH_REPO   = 'yunitechhk2025/yunitech-website';
const GH_BRANCH = 'main';
const NEWS_FILE = 'news-data.js';

let news = [];
let pendingFile = null;
let saving = false;

// ── 登录 ──
function doLogin(){
  if(document.getElementById('pw').value === ADMIN_KEY){
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    initToken();
    loadNews();
  } else {
    document.getElementById('loginErr').style.display = 'block';
  }
}
document.getElementById('pw').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
function logout(){ location.reload(); }

// ── Token ──
function initToken(){
  const t = localStorage.getItem('yuni_gh_token') || '';
  if(t){
    document.getElementById('ghToken').value = t;
    setTokenStatus(true);
  }
}
function toggleToken(){
  const body = document.getElementById('tokenBody');
  const arrow = document.getElementById('tokenArrow');
  body.classList.toggle('open');
  arrow.textContent = body.classList.contains('open') ? '▲' : '▼';
}
function saveToken(){
  const t = document.getElementById('ghToken').value.trim();
  if(!t){ toast('请输入 Token','err'); return; }
  localStorage.setItem('yuni_gh_token', t);
  setTokenStatus(true);
  document.getElementById('tokenBody').classList.remove('open');
  document.getElementById('tokenArrow').textContent = '▼';
  toast('Token 已保存，正在同步资讯数据…','ok');
  loadNews(); // 用 token 重新从 GitHub 加载，确保 SHA 最新
}
function setTokenStatus(ok){
  document.getElementById('tokenDot').className = 'token-dot' + (ok?' ok':'');
  document.getElementById('tokenLabel').textContent = ok
    ? '✅ GitHub Token 已配置（点击修改）'
    : '设置 GitHub Token（发布必须）';
}

// ── 语言 tabs ──
function switchLang(lang, btn){
  document.querySelectorAll('.lang-tab').forEach(b=>b.classList.remove('on'));
  document.querySelectorAll('.lf').forEach(f=>f.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('lf-'+lang).classList.add('on');
}

// ── 图片 ──
function previewImg(input){
  const file = input.files[0];
  if(!file) return;
  pendingFile = file;
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById('imgPreview').src = e.target.result;
    document.getElementById('imgPreviewWrap').style.display = 'block';
    document.getElementById('imgUploadLabel').style.display = 'none';
  };
  reader.readAsDataURL(file);
}
function removeImg(){
  pendingFile = null;
  document.getElementById('imgFile').value = '';
  document.getElementById('imgPreview').src = '';
  document.getElementById('imgPreviewWrap').style.display = 'none';
  document.getElementById('imgUploadLabel').style.display = 'flex';
}

async function uploadImg(token){
  if(!pendingFile) return '';
  const ext  = pendingFile.name.split('.').pop().toLowerCase();
  const path = 'images/news/news-' + Date.now() + '.' + ext;
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = async e => {
      const b64 = e.target.result.split(',')[1];
      try {
        const r = await ghFetch('PUT',
          `https://api.github.com/repos/${GH_REPO}/contents/${path}`,
          { message:'upload news image', content:b64, branch:GH_BRANCH }, token);
        resolve('https://yunitechhk.com/' + path);
      } catch(e){ reject(e); }
    };
    reader.readAsDataURL(pendingFile);
  });
}

// UTF-8 安全的 base64 解码（支持中文）
function b64DecodeUTF8(str){
  const bytes = atob(str.replace(/\n/g,''));
  const arr = new Uint8Array(bytes.length);
  for(let i=0;i<bytes.length;i++) arr[i]=bytes.charCodeAt(i);
  return new TextDecoder('utf-8').decode(arr);
}

// ── 加载资讯（优先从 GitHub 读，保证 SHA 最新）──
async function loadNews(){
  const token = localStorage.getItem('yuni_gh_token')||'';
  if(token){
    try {
      const info = await ghFetch('GET',
        `https://api.github.com/repos/${GH_REPO}/contents/${NEWS_FILE}?ref=${GH_BRANCH}`,
        null, token);
      const text = b64DecodeUTF8(info.content); // 正确解码 UTF-8
      news = parseNewsJs(text);
      renderList();
      return;
    } catch(e){ console.warn('GitHub load failed, fallback to local', e); }
  }
  // fallback：从本地文件读
  try {
    const r = await fetch('news-data.js?t='+Date.now());
    const text = await r.text();
    news = parseNewsJs(text);
    renderList();
  } catch(e){ news=[]; renderList(); }
}

function parseNewsJs(text){
  try {
    const m = text.match(/const\s+newsData\s*=\s*(\[[\s\S]*?\]);/);
    return m ? JSON.parse(m[1]) : [];
  } catch(e){ return []; }
}

// ── 发布 ──
async function publish(){
  const token = localStorage.getItem('yuni_gh_token') || document.getElementById('ghToken').value.trim();
  if(!token){ toast('请先配置 GitHub Token','err'); toggleToken(); return; }

  const date    = document.getElementById('fDate').value;
  const link    = document.getElementById('fLink').value.trim();
  const pinned  = document.getElementById('fPinned').checked;
  const tTw = document.getElementById('t-zh-tw').value.trim();
  const tCn = document.getElementById('t-zh-cn').value.trim();
  const tEn = document.getElementById('t-en').value.trim();
  const cTw = document.getElementById('c-zh-tw').value.trim();
  const cCn = document.getElementById('c-zh-cn').value.trim();
  const cEn = document.getElementById('c-en').value.trim();

  if(!tTw && !tCn && !tEn){ toast('请至少填写一种语言的标题','err'); return; }
  if(!date){ toast('请选择日期','err'); return; }

  const btn = document.getElementById('pubBtn');
  btn.disabled = true;

  // 上传图片
  let imageUrl = '';
  if(pendingFile){
    toast('<span class="spinner"></span>上传图片中…','');
    try { imageUrl = await uploadImg(token); pendingFile = null; removeImg(); }
    catch(e){ toast('图片上传失败：'+e.message,'err'); btn.disabled=false; return; }
  }

  // 组装新条目
  const item = {
    id: 'n'+Date.now(), date, pinned, image: imageUrl,
    title:   {'zh-tw':tTw||tCn||tEn,'zh-cn':tCn||tTw||tEn,'en':tEn||tTw||tCn},
    content: {'zh-tw':cTw||cCn||cEn,'zh-cn':cCn||cTw||cEn,'en':cEn||cTw||cCn}
  };
  if(link) item.link = link;

  news.unshift(item);
  toast('<span class="spinner"></span>发布中…','');

  const ok = await saveNews(token);
  if(ok){
    // 清空表单
    ['t-zh-tw','t-zh-cn','t-en','c-zh-tw','c-zh-cn','c-en'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('fLink').value='';
    document.getElementById('fDate').value=new Date().toISOString().slice(0,10);
    document.getElementById('fPinned').checked=false;
    renderList();
    toast('✅ 发布成功！官网约 1 分钟后更新','ok');
  } else {
    news.shift();
  }
  btn.disabled = false;
}

async function deleteItem(id){
  if(!confirm('确定删除？')) return;
  const token = localStorage.getItem('yuni_gh_token') || '';
  if(!token){ toast('请先配置 Token','err'); return; }
  const backup = [...news];
  news = news.filter(n=>n.id!==id);
  const ok = await saveNews(token);
  if(ok){ renderList(); toast('已删除','ok'); }
  else { news = backup; }
}

async function togglePin(id){
  const token = localStorage.getItem('yuni_gh_token') || '';
  if(!token){ toast('请先配置 Token','err'); return; }
  const item = news.find(n=>n.id===id);
  if(!item) return;
  item.pinned = !item.pinned;
  const ok = await saveNews(token);
  if(ok) renderList();
  else item.pinned = !item.pinned;
}

// ── GitHub API ──
async function saveNews(token, retry=2){
  if(saving){ toast('正在保存中，请稍候…','err'); return false; }
  saving = true;
  try {
    // 每次保存都重新拉取最新 SHA，避免 409
    const info = await ghFetch('GET',
      `https://api.github.com/repos/${GH_REPO}/contents/${NEWS_FILE}?ref=${GH_BRANCH}`,
      null, token);
    const content = `const newsData = ${JSON.stringify(news,null,4)};\n`;
    const encoded = btoa(unescape(encodeURIComponent(content)));
    await ghFetch('PUT',
      `https://api.github.com/repos/${GH_REPO}/contents/${NEWS_FILE}`,
      {message:'update news-data.js',content:encoded,sha:info.sha,branch:GH_BRANCH}, token);
    saving = false;
    return true;
  } catch(e){
    saving = false;
    // 409 冲突时自动重试
    if((e.message.includes('409') || e.message.toLowerCase().includes('conflict')) && retry > 0){
      toast('检测到冲突，自动重试…','');
      await new Promise(r=>setTimeout(r,800));
      return saveNews(token, retry-1);
    }
    toast('保存失败：'+e.message,'err');
    return false;
  }
}

async function ghFetch(method, url, body, token){
  const opts = {
    method,
    headers:{'Authorization':'token '+token,'Content-Type':'application/json','Accept':'application/vnd.github.v3+json'}
  };
  if(body) opts.body = JSON.stringify(body);
  const r = await fetch(url, opts);
  if(!r.ok){ const e=await r.json().catch(()=>({})); throw new Error(e.message||r.status); }
  return r.json();
}

// ── 列表渲染 ──
function renderList(){
  const el = document.getElementById('newsList');
  if(!news.length){ el.innerHTML='<div class="empty">暂无资讯</div>'; return; }
  const sorted = [...news].sort((a,b)=>{
    if(a.pinned&&!b.pinned) return -1;
    if(!a.pinned&&b.pinned) return 1;
    return new Date(b.date)-new Date(a.date);
  });
  el.innerHTML = sorted.map(item=>`
    <div class="news-item">
      <div>
        ${item.image?`<img src="${item.image}" style="width:100%;max-height:100px;object-fit:cover;border-radius:8px;margin-bottom:.5rem;display:block;">`:'' }
        <div class="ni-title">${item.title['zh-tw']||item.title['zh-cn']||item.title['en']}</div>
        <div class="ni-meta">
          <span>${item.date}</span>
          ${item.pinned?'<span class="ni-pin">📌 置顶</span>':''}
          ${item.link?`<a href="${item.link}" target="_blank" style="color:#667eea">链接</a>`:''}
        </div>
      </div>
      <div class="ni-actions">
        <button class="btn-sm btn-edit" onclick="openEdit('${item.id}')">编辑</button>
        <button class="btn-sm btn-pin-toggle" onclick="togglePin('${item.id}')">${item.pinned?'取消置顶':'置顶'}</button>
        <button class="btn-sm btn-del" onclick="deleteItem('${item.id}')">删除</button>
      </div>
    </div>`).join('');
}

// ── 编辑已有资讯 ──
let editingId = null;
let ePendingFile = null;

function openEdit(id){
  const item = news.find(n=>n.id===id);
  if(!item) return;
  editingId = id;
  ePendingFile = null;

  document.getElementById('eFDate').value     = item.date||'';
  document.getElementById('eFLink').value     = item.link||'';
  document.getElementById('eFPinned').checked = !!item.pinned;
  document.getElementById('eImgUrl').value    = item.image||'';

  if(item.image){
    document.getElementById('eImgPreview').src = item.image;
    document.getElementById('eImgPreviewWrap').style.display = 'block';
    document.getElementById('eImgUploadLabel').style.display = 'none';
  } else {
    document.getElementById('eImgPreviewWrap').style.display = 'none';
    document.getElementById('eImgUploadLabel').style.display = 'flex';
  }

  ['zh-tw','zh-cn','en'].forEach(l=>{
    document.getElementById('et-'+l).value = item.title[l]||'';
    document.getElementById('ec-'+l).value = item.content[l]||'';
  });

  // 重置语言 tab
  document.querySelectorAll('#editOverlay .lang-tab').forEach((b,i)=>b.classList.toggle('on',i===0));
  document.querySelectorAll('#editOverlay .lf').forEach((f,i)=>f.classList.toggle('on',i===0));

  const ov = document.getElementById('editOverlay');
  ov.style.display = 'flex';
}

function closeEdit(){
  document.getElementById('editOverlay').style.display = 'none';
  editingId = null; ePendingFile = null;
}

function eSwLang(lang, btn){
  document.querySelectorAll('#editOverlay .lang-tab').forEach(b=>b.classList.remove('on'));
  document.querySelectorAll('#editOverlay .lf').forEach(f=>f.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('elf-'+lang).classList.add('on');
}

function ePreviewImg(input){
  const file = input.files[0];
  if(!file) return;
  ePendingFile = file;
  const reader = new FileReader();
  reader.onload = e=>{
    document.getElementById('eImgPreview').src = e.target.result;
    document.getElementById('eImgPreviewWrap').style.display = 'block';
    document.getElementById('eImgUploadLabel').style.display = 'none';
  };
  reader.readAsDataURL(file);
}

function eRemoveImg(){
  ePendingFile = null;
  document.getElementById('eImgFile').value = '';
  document.getElementById('eImgUrl').value = '';
  document.getElementById('eImgPreview').src = '';
  document.getElementById('eImgPreviewWrap').style.display = 'none';
  document.getElementById('eImgUploadLabel').style.display = 'flex';
}

async function saveEdit(){
  const token = localStorage.getItem('yuni_gh_token')||'';
  if(!token){ toast('请先配置 GitHub Token','err'); return; }

  const item = news.find(n=>n.id===editingId);
  if(!item) return;

  const tTw = document.getElementById('et-zh-tw').value.trim();
  const tCn = document.getElementById('et-zh-cn').value.trim();
  const tEn = document.getElementById('et-en').value.trim();
  if(!tTw&&!tCn&&!tEn){ toast('请至少填写一种语言的标题','err'); return; }

  // 上传新图片
  let imageUrl = document.getElementById('eImgUrl').value.trim();
  if(ePendingFile){
    toast('<span class="spinner"></span>上传图片中…','');
    try {
      const ext  = ePendingFile.name.split('.').pop().toLowerCase();
      const path = 'images/news/news-'+Date.now()+'.'+ext;
      const b64  = await fileToBase64(ePendingFile);
      await ghFetch('PUT',`https://api.github.com/repos/${GH_REPO}/contents/${path}`,
        {message:'upload news image',content:b64,branch:GH_BRANCH}, token);
      imageUrl = 'https://yunitechhk.com/'+path;
      ePendingFile = null;
    } catch(e){ toast('图片上传失败：'+e.message,'err'); return; }
  }

  item.date    = document.getElementById('eFDate').value;
  item.link    = document.getElementById('eFLink').value.trim();
  item.pinned  = document.getElementById('eFPinned').checked;
  item.image   = imageUrl;
  item.title   = {'zh-tw':tTw||tCn||tEn,'zh-cn':tCn||tTw||tEn,'en':tEn||tTw||tCn};
  item.content = {
    'zh-tw': document.getElementById('ec-zh-tw').value.trim()||document.getElementById('ec-zh-cn').value.trim()||document.getElementById('ec-en').value.trim(),
    'zh-cn': document.getElementById('ec-zh-cn').value.trim()||document.getElementById('ec-zh-tw').value.trim()||document.getElementById('ec-en').value.trim(),
    'en':    document.getElementById('ec-en').value.trim()||document.getElementById('ec-zh-tw').value.trim()||document.getElementById('ec-zh-cn').value.trim()
  };

  toast('<span class="spinner"></span>保存中…','');
  const ok = await saveNews(token);
  if(ok){ closeEdit(); renderList(); toast('✅ 已保存，官网约 1 分钟后更新','ok'); }
}

function fileToBase64(file){
  return new Promise((resolve,reject)=>{
    const r = new FileReader();
    r.onload = e => resolve(e.target.result.split(',')[1]);
    r.onerror = reject;
    r.readAsDataURL(file);
  });
}

// ── Toast ──
let _tt;
function toast(msg, type){
  const el = document.getElementById('toast');
  el.innerHTML = msg;
  el.className = 'toast show'+(type?' '+type:'');
  clearTimeout(_tt);
  _tt = setTimeout(()=>el.classList.remove('show'), 3500);
}

// 初始化日期
document.getElementById('fDate').value = new Date().toISOString().slice(0,10);
</script>
